services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=puskesmas
      - DB_USERNAME=puskesmas_user
      - DB_PASSWORD=puskesmas_pass
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/vendor
      - /app/node_modules
      - ./.env.docker:/app/.env

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=puskesmas
      - POSTGRES_USER=puskesmas_user
      - POSTGRES_PASSWORD=puskesmas_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U puskesmas_user -d puskesmas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
